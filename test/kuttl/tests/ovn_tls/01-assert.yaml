apiVersion: ovn.openstack.org/v1beta1
kind: OVNNorthd
metadata:
  name: ovnnorthd-sample
spec:
  tls:
    caBundleSecretName: combined-ca-bundle
    secretName: cert-ovnnorthd-svc
status:
  readyCount: 1
---
apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-nb-sample
spec:
  tls:
    caBundleSecretName: combined-ca-bundle
    secretName: cert-ovsdbserver-nb-svc
status:
  readyCount: 1
---
apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-sb-sample
spec:
  tls:
    caBundleSecretName: combined-ca-bundle
    secretName: cert-ovsdbserver-sb-svc
status:
  readyCount: 1
---
apiVersion: ovn.openstack.org/v1beta1
kind: OVNController
metadata:
  name: ovncontroller-sample
spec:
  tls:
    caBundleSecretName: combined-ca-bundle
    secretName: cert-ovncontroller-svc
status:
  conditions:
  - message: Setup complete
    reason: Ready
    status: "True"
    type: Ready
  - message: Deployment completed
    reason: Ready
    status: "True"
    type: DeploymentReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: InputReady
  - message: NetworkAttachments completed
    reason: Ready
    status: "True"
    type: NetworkAttachmentsReady
  - message: RoleBinding created
    reason: Ready
    status: "True"
    type: RoleBindingReady
  - message: Role created
    reason: Ready
    status: "True"
    type: RoleReady
  - message: ServiceAccount created
    reason: Ready
    status: "True"
    type: ServiceAccountReady
  - message: Service config create completed
    reason: Ready
    status: "True"
    type: ServiceConfigReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: TLSInputReady
---
# check the DB uri scheme is ssl
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      template='{{.status.internalDbAddress}}{{"\n"}}'
      regex="ssl:.*"
      dbUri=$(oc get -n $NAMESPACE OVNDBCluster ovndbcluster-sb-sample -o go-template="$template")
      matches=$(echo "$dbUri" | sed -e "s?$regex??")
      if [[ -n "$matches" ]]; then
        exit 1
      fi
  # Verify cert-manager RBAC PKI CA resources are created for SB with TLS
  - script: |
      # Check self-signed issuer exists
      oc get issuer -n $NAMESPACE ovn-rbac-selfsigned-issuer
  - script: |
      # Check CA certificate exists and is a CA
      oc get certificate -n $NAMESPACE ovn-rbac-pki-ca -o jsonpath='{.spec.isCA}' | grep -q "true"
  - script: |
      # Check CA issuer exists and references the correct secret
      oc get issuer -n $NAMESPACE ovn-rbac-ca-issuer -o jsonpath='{.spec.ca.secretName}' | grep -q "ovn-rbac-pki-ca"
  # Verify SB service has RBAC full-access port (16642)
  - script: |
      oc get service -n $NAMESPACE ovsdbserver-sb-0 -o jsonpath='{.spec.ports[*].port}' | grep -q "16642"
  # Verify system-id is a deterministic UUID5 derived from node name (required for RBAC)
  - script: |
      controller_pod=$(oc get pod -n $NAMESPACE -l service=ovn-controller -o name|head -1)
      system_id=$(oc rsh -n $NAMESPACE ${controller_pod} ovs-vsctl get open . external-ids:system-id | tr -d '"')
      node_name=$(oc get -n $NAMESPACE ${controller_pod} -o jsonpath='{.spec.nodeName}')
      expected_id=$(python3 -c "import uuid,sys; print(uuid.uuid5(uuid.NAMESPACE_DNS, sys.argv[1]))" "${node_name}")
      if [ "${system_id}" != "${expected_id}" ]; then
        echo "system-id (${system_id}) does not match expected UUID5 (${expected_id}) for node ${node_name}"
        exit 1
      fi
  # Verify per-node RBAC certificate exists and CN matches system-id (UUID5)
  - script: |
      controller_pod=$(oc get pod -n $NAMESPACE -l service=ovn-controller -o name|head -1)
      node_name=$(oc get -n $NAMESPACE ${controller_pod} -o jsonpath='{.spec.nodeName}')
      expected_id=$(python3 -c "import uuid,sys; print(uuid.uuid5(uuid.NAMESPACE_DNS, sys.argv[1]))" "${node_name}")
      cert_cn=$(oc rsh -n $NAMESPACE ${controller_pod} openssl x509 -in /etc/openvswitch/ovn-controller-cert.pem -noout -subject 2>/dev/null | sed -n 's/.*CN *= *\([^ ,]*\).*/\1/p')
      if [ -z "${cert_cn}" ]; then
        echo "Per-node RBAC certificate not found at /etc/openvswitch/ovn-controller-cert.pem"
        exit 1
      fi
      if [ "${cert_cn}" != "${expected_id}" ]; then
        echo "Certificate CN (${cert_cn}) does not match expected UUID5 (${expected_id}) for node ${node_name}"
        exit 1
      fi
