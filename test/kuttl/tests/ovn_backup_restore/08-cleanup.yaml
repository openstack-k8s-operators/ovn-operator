apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      oc exec -n $NAMESPACE ovsdbserver-nb-0 -- ovn-nbctl ls-del kuttl-test-switch || true
      oc delete ovndbrestore -n $NAMESPACE ovndbrestore-nb-sample --ignore-not-found || true
      oc delete ovndbbackup -n $NAMESPACE ovndbbackup-nb-sample --ignore-not-found || true
      oc delete job -n $NAMESPACE ovndbbackup-nb-manual --ignore-not-found || true
      oc delete ovndbcluster -n $NAMESPACE ovndbcluster-nb-sample --ignore-not-found || true
      oc delete ovndbcluster -n $NAMESPACE ovndbcluster-sb-sample --ignore-not-found || true
      oc delete ovnnorthd -n $NAMESPACE ovnnorthd-sample --ignore-not-found || true
      oc delete ovncontroller -n $NAMESPACE ovncontroller-sample --ignore-not-found || true
      sleep 10
      oc delete pods -n $NAMESPACE --all --grace-period=0 --force 2>/dev/null || true
