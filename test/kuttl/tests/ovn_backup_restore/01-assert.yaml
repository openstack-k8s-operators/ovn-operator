#
# Check for:
#
# - OVNDBCluster NB ready
# - OVNDBCluster SB ready
# - ovsdbserver-nb-0 Pod running
# - ovsdbserver-sb-0 Pod running
#
apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-nb-sample
spec:
  dbType: NB
  replicas: 1
status:
  readyCount: 1
---
apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-sb-sample
spec:
  dbType: SB
  replicas: 1
status:
  readyCount: 1
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    service: ovsdbserver-nb
  name: ovsdbserver-nb-0
status:
  phase: Running
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    service: ovsdbserver-sb
  name: ovsdbserver-sb-0
status:
  phase: Running
