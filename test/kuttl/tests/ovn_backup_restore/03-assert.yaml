apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      oc exec -n $NAMESPACE ovsdbserver-nb-0 -- ovn-nbctl ls-list | grep -q kuttl-test-switch
      if [ $? -ne 0 ]; then
        echo "Test data 'kuttl-test-switch' not found in NB database"
        exit 1
      fi
      echo "Test data seeded successfully"
      exit 0
