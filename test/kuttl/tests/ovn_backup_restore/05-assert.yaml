#
# Check for:
#
# - Manual backup job completed
# - Backup file exists on the PVC
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
commands:
  - script: |
      oc wait -n $NAMESPACE job/ovndbbackup-nb-manual --for=condition=complete --timeout=90s
  - script: |
      pod=$(oc get pods -n $NAMESPACE -l job-name=ovndbbackup-nb-manual -o name | head -1)
      logs=$(oc logs -n $NAMESPACE $pod)
      echo "$logs"
      echo "$logs" | grep -q "Backup finished successfully" || exit 1
      exit 0
