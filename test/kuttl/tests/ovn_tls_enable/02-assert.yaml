apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-nb-sample
spec:
  replicas: 3
status:
  readyCount: 3
---
apiVersion: ovn.openstack.org/v1beta1
kind: OVNDBCluster
metadata:
  name: ovndbcluster-sb-sample
spec:
  replicas: 3
status:
  readyCount: 3
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  # check the DB uri scheme is ssl
  - script: |
      template='{{.status.internalDbAddress}}{{"\n"}}'
      regex="ssl:.*"
      dbUri=$(oc get -n $NAMESPACE OVNDBCluster ovndbcluster-sb-sample -o go-template="$template")
      matches=$(echo "$dbUri" | sed -e "s?$regex??")
      if [[ -n "$matches" ]]; then
        exit 1
      fi
  # Check ovn connect is pssl
  - script: |
      sb_pod=$(oc get pod -n $NAMESPACE -l service=ovsdbserver-sb -o name|head -1)
      oc rsh -n $NAMESPACE ${sb_pod} ovn-sbctl --no-leader-only  get-connection | grep -q pssl
  # Check we have 3 servers using ssl
  - script: |
      ../../common/scripts/check_cluster_status.sh nb 3 ssl
  - script: |
      ../../common/scripts/check_cluster_status.sh sb 3 ssl
  # Verify cert-manager RBAC PKI CA resources are created for SB with TLS
  - script: |
      oc get issuer -n $NAMESPACE ovn-rbac-selfsigned-issuer
  - script: |
      oc get certificate -n $NAMESPACE ovn-rbac-pki-ca -o jsonpath='{.spec.isCA}' | grep -q "true"
  - script: |
      oc get issuer -n $NAMESPACE ovn-rbac-ca-issuer -o jsonpath='{.spec.ca.secretName}' | grep -q "ovn-rbac-pki-ca"
  # Verify SB service has RBAC full-access port (16642)
  - script: |
      oc get service -n $NAMESPACE ovsdbserver-sb-0 -o jsonpath='{.spec.ports[*].port}' | grep -q "16642"
  # Verify system-id is a deterministic UUID5 derived from node name (required for RBAC)
  - script: |
      controller_pod=$(oc get pod -n $NAMESPACE -l service=ovn-controller -o name|head -1)
      system_id=$(oc rsh -n $NAMESPACE ${controller_pod} ovs-vsctl get open . external-ids:system-id | tr -d '"')
      node_name=$(oc get -n $NAMESPACE ${controller_pod} -o jsonpath='{.spec.nodeName}')
      expected_id=$(python3 -c "import uuid,sys; print(uuid.uuid5(uuid.NAMESPACE_DNS, sys.argv[1]))" "${node_name}")
      if [ "${system_id}" != "${expected_id}" ]; then
        echo "system-id (${system_id}) does not match expected UUID5 (${expected_id}) for node ${node_name}"
        exit 1
      fi
  # Verify per-node RBAC certificate exists and CN matches system-id (UUID5)
  - script: |
      controller_pod=$(oc get pod -n $NAMESPACE -l service=ovn-controller -o name|head -1)
      node_name=$(oc get -n $NAMESPACE ${controller_pod} -o jsonpath='{.spec.nodeName}')
      expected_id=$(python3 -c "import uuid,sys; print(uuid.uuid5(uuid.NAMESPACE_DNS, sys.argv[1]))" "${node_name}")
      cert_cn=$(oc rsh -n $NAMESPACE ${controller_pod} openssl x509 -in /etc/openvswitch/ovn-controller-cert.pem -noout -subject 2>/dev/null | sed -n 's/.*CN *= *\([^ ,]*\).*/\1/p')
      if [ -z "${cert_cn}" ]; then
        echo "Per-node RBAC certificate not found at /etc/openvswitch/ovn-controller-cert.pem"
        exit 1
      fi
      if [ "${cert_cn}" != "${expected_id}" ]; then
        echo "Certificate CN (${cert_cn}) does not match expected UUID5 (${expected_id}) for node ${node_name}"
        exit 1
      fi
  # Verify internalDbAddressRbacFullAccess is set on SB OVNDBCluster with port 16642
  - script: |
      template='{{.status.internalDbAddressRbacFullAccess}}{{"\n"}}'
      dbUri=$(oc get -n $NAMESPACE OVNDBCluster ovndbcluster-sb-sample -o go-template="$template")
      if [[ -z "$dbUri" ]]; then
        echo "internalDbAddressRbacFullAccess is not set on SB OVNDBCluster"
        exit 1
      fi
      echo "$dbUri" | grep -q "ssl:" || { echo "internalDbAddressRbacFullAccess does not use ssl scheme"; exit 1; }
      echo "$dbUri" | grep -q ":16642" || { echo "internalDbAddressRbacFullAccess does not use port 16642"; exit 1; }
  # Verify internalDbAddressRbacFullAccess is NOT set on NB OVNDBCluster
  - script: |
      template='{{.status.internalDbAddressRbacFullAccess}}{{"\n"}}'
      dbUri=$(oc get -n $NAMESPACE OVNDBCluster ovndbcluster-nb-sample -o go-template="$template")
      if [[ -n "$dbUri" && "$dbUri" != "<no value>" ]]; then
        echo "internalDbAddressRbacFullAccess should not be set on NB OVNDBCluster but got: ${dbUri}"
        exit 1
      fi
  # Verify northd uses port 16642 for SB and port 6641 for NB
  - script: |
      northd_args=$(oc get statefulset -n $NAMESPACE ovn-northd -o jsonpath='{.spec.template.spec.containers[0].args}')
      echo "$northd_args" | grep -q -e "--ovnsb-db=.*:16642" || { echo "northd --ovnsb-db does not use port 16642"; exit 1; }
      echo "$northd_args" | grep -q -e "--ovnnb-db=.*:6641" || { echo "northd --ovnnb-db does not use port 6641"; exit 1; }
