#
# Check for:
#
# - The interface "data-centre3" NAD exists
# - The interface "datacentre2" NAD exists
# - The interface "datacentre5" NAD exists
# - Pods have the correct NAD order in ovn-controller-ovs pod
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: data-centre3
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: datacentre2
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: datacentre5
spec:
  config: '{"cniVersion": "0.3.1","name": "datacentre5", "type": "bond", "mode": "active-backup",
    "failOverMac": 1, "linksInContainer": true, "miimon": "100", "mtu": 1000, "links":
    [{"name": "datacentre2"}, {"name": "data-centre3"}]}'

---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{"name":"datacentre2","namespace":"ovn-kuttl","interface":"datacentre2"},{"name":"data-centre3","namespace":"ovn-kuttl","interface":"data-centre3"},{"name":"datacentre5","namespace":"ovn-kuttl","interface":"datacentre5"}]'
  generateName: ovn-controller-ovs-
